name: Keep Alive
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up aeroprep.top
        run: |
          curl -s --max-time 15 https://www.aeroprep.top -o /dev/null || echo "ping 1 done"
      - name: Wake up Vercel
        run: |
          curl -s --max-time 15 https://aeroprepaiajay.vercel.app -o /dev/null || echo "ping 2 done"
